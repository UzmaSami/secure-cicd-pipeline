# ================================================
# GitHub Actions - Weekly Dependency Check
# ================================================
name: Weekly Dependency Security Check

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Full Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: |
          pip install safety pip-audit

      - name: Run pip-audit
        run: |
          echo "========================================="
          echo "  WEEKLY DEPENDENCY AUDIT"
          echo "========================================="
          pip-audit -r app/requirements.txt || true

      - name: Run Safety Check
        run: |
          safety check \
            --file app/requirements.txt \
            --output text || true