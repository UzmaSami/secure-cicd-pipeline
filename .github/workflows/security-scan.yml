# ================================================
# GitHub Actions - Security Scanning Pipeline
# ================================================
name: Security Scanning Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ----------------------------------------
  # JOB 1 - Python Security Scan (Bandit)
  # ----------------------------------------
  python-security-scan:
    name: Python Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: |
          mkdir -p reports
          bandit -r app/ \
            -f json \
            -o reports/bandit-report.json \
            --severity-level medium || true

      - name: Display Bandit Results
        run: |
          echo "========================================="
          echo "  PYTHON SECURITY SCAN RESULTS"
          echo "========================================="
          cat reports/bandit-report.json || echo "No issues found"

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: reports/bandit-report.json

  # ----------------------------------------
  # JOB 2 - Secrets Detection (TruffleHog)
  # ----------------------------------------
  secrets-detection:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

  # ----------------------------------------
  # JOB 3 - Container Scan (Trivy)
  # ----------------------------------------
  container-security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          mkdir -p reports
          docker build \
            -f docker/Dockerfile \
            -t secure-app:${{ github.sha }} .

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-app:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: reports/trivy-results.sarif

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: reports/trivy-results.sarif

  # ----------------------------------------
  # JOB 4 - Dependency Check
  # ----------------------------------------
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Dependency Check
        run: |
          echo "========================================="
          echo "  DEPENDENCY VULNERABILITY SCAN"
          echo "========================================="
          safety check \
            -r app/requirements.txt \
            --output text || true

  # ----------------------------------------
  # JOB 5 - Security Report Summary
  # ----------------------------------------
  security-summary:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs:
      - python-security-scan
      - secrets-detection
      - container-security-scan
      - dependency-check

    steps:
      - name: Print Security Summary
        run: |
          echo "========================================="
          echo "   SECURITY PIPELINE COMPLETE"
          echo "========================================="
          echo "✅ Python Security Scan    - Done"
          echo "✅ Secrets Detection       - Done"
          echo "✅ Container Security Scan - Done"
          echo "✅ Dependency Check        - Done"
          echo "========================================="
          echo "Check artifacts for detailed reports"
